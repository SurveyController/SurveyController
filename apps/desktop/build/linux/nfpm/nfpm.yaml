
name: "SurveyController"
arch: ${GOARCH}
platform: "linux"
version: "5.0.0"
section: "default"
priority: "extra"
maintainer: ${GIT_COMMITTER_NAME} <${GIT_COMMITTER_EMAIL}>
description: "SurveyController Desktop UI"
vendor: "HungryM0"
homepage: "https://wails.io"
license: "MIT"
release: "1"

contents:
  - src: "./bin/SurveyController"
    dst: "/usr/local/bin/SurveyController"
  - src: "./assets/icon.png"
    dst: "/usr/share/icons/hicolor/128x128/apps/SurveyController.png"
  - src: "./build/linux/SurveyController.desktop"
    dst: "/usr/share/applications/SurveyController.desktop"

depends:
  - libgtk-4-1
  - libwebkitgtk-6.0-4

overrides:
  rpm:
    depends:
      - gtk4
      - webkitgtk6.0

  archlinux:
    depends:
      - gtk4
      - webkitgtk-6.0

scripts:
  postinstall: "./build/linux/nfpm/scripts/postinstall.sh"
