# 桌面端构建配置
# 修改 `info` 或 `fileAssociations` 后运行 `wails3 task common:generate:icons` 同步构建资源。
version: '3'

# 这些信息用于生成构建资源。
info:
  companyName: "HUNGRY_M0" # 公司名
  productName: "SurveyController" # 应用名
  productIdentifier: "com.hungrym0.surveycontroller" # 唯一产品标识
  description: "SurveyController" # 应用描述
  copyright: "(c) 2026, HUNGRY_M0" # 版权文本
  comments: "适用于问卷星、腾讯问卷、见数平台的高并发提交程序" # 备注
  version: "5.0.0" # 应用版本号

dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend
      - bin
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
      - "*_test.go"
    watched_extension:
      - "*.go"
      - "*.js"
      - "*.ts"
    git_ignore: true
  executes:
    - cmd: wails3 build DEV=true
      type: blocking
    - cmd: wails3 task common:dev:frontend
      type: background
    - cmd: wails3 task run
      type: primary

# 文件关联
# 详情见：https://v3.wails.io/noit/done/yet
fileAssociations:
#  - ext: wails
#    name: Wails
#    description: Wails 应用文件
#    iconName: wailsFileIcon
#    role: Editor
#  - ext: jpg
#    name: JPEG
#    description: 图片文件
#    iconName: jpegFileIcon
#    role: Editor
#    mimeType: image/jpeg  # 可选

# 其他数据
other:
  - name: My Other Data
