name: Build Release Installer

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  R2_FEED_PREFIX: "surveycontroller/win/stable"

concurrency:
  group: build-release-installer-${{ github.event.release.id }}
  cancel-in-progress: false

jobs:
  build-and-publish:
    name: Build And Publish Installer
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller velopack

      - name: Show Python and PyInstaller version
        shell: powershell
        run: |
          python --version
          python -m PyInstaller --version

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Install Velopack CLI
        shell: powershell
        run: dotnet tool install -g vpk

      - name: Resolve release metadata
        id: release_meta
        shell: powershell
        run: |
          $tag = "${{ github.event.release.tag_name }}"
          $packVersion = $tag.TrimStart('v')
          $releaseDir = Join-Path "${{ github.workspace }}" "Releases"
          $setupName = "SurveyController_${tag}_setup.exe"
          $setupPath = Join-Path $releaseDir $setupName
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "pack_version=$packVersion" >> $env:GITHUB_OUTPUT
          "release_dir=$releaseDir" >> $env:GITHUB_OUTPUT
          "setup_name=$setupName" >> $env:GITHUB_OUTPUT
          "setup_path=$setupPath" >> $env:GITHUB_OUTPUT

      - name: Build PyInstaller bundle
        shell: powershell
        run: |
          Remove-Item -Recurse -Force build, dist, Releases -ErrorAction SilentlyContinue
          python -m PyInstaller SurveyController.spec --noconfirm --clean

      - name: Build Velopack release package
        shell: powershell
        run: |
          $releaseDir = "${{ steps.release_meta.outputs.release_dir }}"
          New-Item -ItemType Directory -Path $releaseDir -Force | Out-Null
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
          vpk pack `
            --packId SurveyController `
            --packTitle "SurveyController" `
            --packVersion "${{ steps.release_meta.outputs.pack_version }}" `
            --packDir "dist/lib" `
            --mainExe "SurveyController.exe" `
            --icon "dist/lib/icon.ico" `
            --channel "stable" `
            --outputDir $releaseDir

      - name: Rename setup installer
        shell: powershell
        run: |
          $releaseDir = "${{ steps.release_meta.outputs.release_dir }}"
          $generatedSetup = Join-Path $releaseDir "SurveyController-Setup.exe"
          $targetSetup = "${{ steps.release_meta.outputs.setup_path }}"
          if (-not (Test-Path $generatedSetup)) {
            throw "Velopack setup executable not found: $generatedSetup"
          }
          Move-Item -LiteralPath $generatedSetup -Destination $targetSetup -Force

      - name: Verify release output
        shell: powershell
        run: |
          $releaseDir = "${{ steps.release_meta.outputs.release_dir }}"
          $setupPath = "${{ steps.release_meta.outputs.setup_path }}"
          if (-not (Test-Path $setupPath)) {
            throw "Setup installer not found: $setupPath"
          }
          $requiredFiles = @(
            $setupPath,
            (Join-Path $releaseDir "releases.stable.json")
          )
          foreach ($required in $requiredFiles) {
            if (-not (Test-Path $required)) {
              throw "Required release asset missing: $required"
            }
          }
          $nupkgs = Get-ChildItem -Path $releaseDir -Filter "*.nupkg"
          if (-not $nupkgs) {
            throw "No Velopack nupkg packages were produced"
          }
          Get-ChildItem $releaseDir | Format-Table Name, Length, LastWriteTime

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: velopack-release-assets
          path: ${{ steps.release_meta.outputs.release_dir }}
          if-no-files-found: error

      - name: Upload release assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: powershell
        run: |
          Get-ChildItem "${{ steps.release_meta.outputs.release_dir }}" | ForEach-Object {
            gh release upload "${{ steps.release_meta.outputs.tag }}" $_.FullName --clobber --repo "${{ github.repository }}"
          }

      - name: Normalize R2 endpoint
        id: r2_endpoint
        shell: powershell
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          $raw = "${env:R2_ACCOUNT_ID}"
          $raw = $raw -replace '^https?://', ''
          $raw = $raw.Split('/')[0]
          $raw = $raw -replace '\.r2\.cloudflarestorage\.com$', ''
          if ([string]::IsNullOrWhiteSpace($raw)) {
            throw "R2_ACCOUNT_ID is empty or invalid"
          }
          "endpoint=https://$raw.r2.cloudflarestorage.com" >> $env:GITHUB_OUTPUT

      - name: Ensure AWS CLI is available
        shell: powershell
        run: |
          $aws = Get-Command aws -ErrorAction SilentlyContinue
          if (-not $aws) {
            choco install awscli --yes --no-progress
            $aws = Get-Command aws -ErrorAction SilentlyContinue
          }
          if (-not $aws) {
            throw "aws CLI is not available"
          }
          aws --version

      - name: Upload release feed and packages to R2
        shell: powershell
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_RETRY_MODE: standard
          AWS_MAX_ATTEMPTS: "3"
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          $releaseDir = "${{ steps.release_meta.outputs.release_dir }}"
          Get-ChildItem $releaseDir | ForEach-Object {
            $contentType = "application/octet-stream"
            $cacheControl = "public, max-age=31536000, immutable"
            if ($_.Name -like "releases.*.json") {
              $contentType = "application/json"
              $cacheControl = "no-cache, no-store, must-revalidate"
            } elseif ($_.Extension -eq ".exe") {
              $contentType = "application/vnd.microsoft.portable-executable"
            }
            aws s3 cp $_.FullName "s3://${env:R2_BUCKET}/${env:R2_FEED_PREFIX}/$($_.Name)" `
              --cache-control $cacheControl `
              --content-type $contentType `
              --endpoint-url "${{ steps.r2_endpoint.outputs.endpoint }}"
          }

      - name: Show release download URLs
        shell: powershell
        run: |
          Write-Host "Release asset:"
          Write-Host "https://github.com/${{ github.repository }}/releases/tag/${{ steps.release_meta.outputs.tag }}"
          Write-Host ""
          Write-Host "Velopack feed:"
          Write-Host "https://dl.hungrym0.top/${env:R2_FEED_PREFIX}/releases.stable.json"
          Write-Host ""
          Write-Host "Setup installer:"
          Write-Host "https://dl.hungrym0.top/${env:R2_FEED_PREFIX}/${{ steps.release_meta.outputs.setup_name }}"
