name: Go CI

on:
  push:
    branches: [main, refactor/go]
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Test Go modules
        run: go test ./packages/proxycore/... ./packages/surveycore/...
