name: Python CI

on:
  pull_request:
  push:
  workflow_dispatch:
    inputs:
      run_push_skipped_ci:
        description: Run the import/window smoke check and live parser regression that push skips.
        required: false
        type: boolean
        default: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: python-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-checks:
    name: Static Checks
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: uv sync --locked

      - name: Run compile check
        run: uv run python -m CI.python_checks.compile_check

      - name: Run Ruff check
        run: uv run python -m CI.python_checks.ruff_check

      - name: Run Pyright check
        run: uv run python -m CI.python_checks.pyright_check

  unit-tests:
    name: Unit Tests
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: uv sync --locked

      - name: Run unit tests
        run: uv run python -m CI.python_checks.unit_test_check

  startup-smoke:
    name: Import And Window Smoke
    if: ${{ github.event_name != 'push' && (github.event_name != 'workflow_dispatch' || inputs.run_push_skipped_ci) }}
    needs:
      - static-checks
      - unit-tests
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: uv sync --locked

      - name: Run module import check
        run: uv run python -m CI.python_checks.import_check

      - name: Run main window smoke check
        run: uv run python -m CI.python_checks.window_smoke_check

  live-parser-regression:
    name: Live Parser Regression
    if: ${{ github.event_name != 'push' && (github.event_name != 'workflow_dispatch' || inputs.run_push_skipped_ci) }}
    needs:
      - startup-smoke
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: uv sync --locked

      - name: Run live survey parser regression tests
        run: uv run pytest CI/live_tests/test_survey_parsers.py -ra -vv --tb=short --durations=10 --color=yes
