name: Upload Release to R2

on:
  release:
    types: [published]

permissions:
  contents: read

env:
  R2_ASSET_PATTERN: "*.exe"
  R2_LATEST_KEY: "fuck-wjx_latest_setup.exe"

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release download "${{ github.event.release.tag_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "${R2_ASSET_PATTERN}" \
            -D dist

          echo "Downloaded files:"
          ls -lah dist

      - name: Resolve upload asset
        id: resolve_upload_asset
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(dist/*.exe)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No .exe asset found in this release"
            exit 1
          fi

          if [ "${#files[@]}" -gt 1 ]; then
            echo "Found multiple .exe assets. Refuse to pick one blindly:"
            printf ' - %s\n' "${files[@]}"
            echo "Please narrow R2_ASSET_PATTERN in workflow env."
            exit 1
          fi

          FILE="${files[0]}"
          echo "Selected asset: ${FILE}"
          echo "asset_file=${FILE}" >> "${GITHUB_OUTPUT}"

      - name: Ensure AWS CLI is available
        run: |
          set -euo pipefail
          if command -v aws >/dev/null 2>&1; then
            aws --version
            exit 0
          fi

          sudo apt-get update
          sudo apt-get install -y awscli
          aws --version

      - name: Upload EXE to R2 with unified name
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_RETRY_MODE: standard
          AWS_MAX_ATTEMPTS: "3"
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail
          FILE="${{ steps.resolve_upload_asset.outputs.asset_file }}"
          echo "Uploading latest alias from: ${FILE}"

          aws s3 cp "${FILE}" \
            "s3://${R2_BUCKET}/${R2_LATEST_KEY}" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "application/vnd.microsoft.portable-executable" \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

      - name: Upload versioned copy to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_RETRY_MODE: standard
          AWS_MAX_ATTEMPTS: "3"
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail
          FILE="${{ steps.resolve_upload_asset.outputs.asset_file }}"
          TAG="${{ github.event.release.tag_name }}"

          aws s3 cp "${FILE}" \
            "s3://${R2_BUCKET}/fuck-wjx_${TAG}.exe" \
            --cache-control "public, max-age=31536000, immutable" \
            --content-type "application/vnd.microsoft.portable-executable" \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

      - name: Show download URLs
        run: |
          echo "Latest:"
          echo "https://dl.hungrym0.top/${R2_LATEST_KEY}"
          echo
          echo "Versioned:"
          echo "https://dl.hungrym0.top/fuck-wjx_${{ github.event.release.tag_name }}.exe"
